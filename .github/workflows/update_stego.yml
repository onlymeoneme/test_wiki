name: Automated Stego Deploy

on:
  schedule:
    # Ротация запускается каждый день в 03:15 UTC (по МСК это 06:15).
    # Время зашито с "минутным джиттером" (15 минут), чтобы не спамить сервера ровно в 00.
    - cron: '15 3 * * *'
  workflow_dispatch: # Добавляет кнопку "Run workflow" в интерфейсе GitHub, чтобы запускать руками в любой момент

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    # 1. Клонируем твой репозиторий, чтобы скрипт увидел папку templates/ с картинками pic_1.jpg ... pic_11.jpg
    - name: Клонирование репозитория
      uses: actions/checkout@v4

    # 2. Поднимаем чистый Python
    - name: Инициализация Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Ставим только requests, так как стёга у нас теперь на чистых байтах
    - name: Установка зависимостей
      run: |
        python -m pip install --upgrade pip
        pip install requests

    # 4. Передаем секреты из настроек репозитория в переменные окружения и запускаем main.py
    - name: Склейка и деплой на Википедию
      env:
        WIKI_USER: ${{ secrets.WIKI_USER }}
        WIKI_PASS: ${{ secrets.WIKI_PASS }}
      run: python main.py
